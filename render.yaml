services:
  # =============================================
  # Serviço único — API NestJS + frontend estático
  #
  # Decisão de negócio: fase inicial usa 1 serviço para minimizar custo.
  # Worker e cron jobs serão ativados em serviços separados apenas quando
  # o volume operacional justificar o custo adicional no Render.
  # =============================================
  - type: web
    name: plataforma-drop
    env: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter database prisma generate && pnpm --filter web build && pnpm --filter api build
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
